; -----------------------------------------
; Microsoft SQL Server Drivers for PHP
; -----------------------------------------

; Load SQLSRV (procedural) driver
extension=sqlsrv

; Load PDO_SQLSRV (PDO) driver
extension=pdo_sqlsrv

; Optional: Increase logging for debugging
;sqlsrv.LogSubsystems = -1
;sqlsrv.LogSeverity = 4

; Ensure PHP uses UTF-8
sqlsrv.WarningsReturnAsErrors = 0
sqlsrv.ClientBufferMaxKBSize = 10240
